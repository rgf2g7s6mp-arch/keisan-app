<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けいさんれんしゅう</title>

<style>

body{
    font-family:"Yu Gothic","Hiragino Maru Gothic ProN",sans-serif;
    padding:16px;
    background:#ffffff;
}

.top-area{
    margin-bottom:24px;
}

h1{
    font-size:28px;
    margin-bottom:16px;
}

.menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.menu button{
    height:50px;
    font-size:22px;
    border-radius:10px;
    border:1px solid #777;
    background:#efefef;
}

.level-area{
    margin-top:14px;
    display:none;
}

.level-label{
    font-size:22px;
    margin-bottom:8px;
}

.level-buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.level-buttons button{
    height:48px;
    font-size:22px;
    border-radius:10px;
    border:1px solid #777;
    background:#efefef;
}

.active-level{
    background:#ffe599 !important;
    font-weight:bold;
}

.status-area{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    font-size:22px;
    font-weight:bold;
    margin-bottom:26px;
}

.problem{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.num{
    width:92px;
    height:62px;
    border:1px solid #333;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding-right:14px;
    font-size:30px;
    box-sizing:border-box;
}

.answer{
    width:92px;
    height:62px;
    border:2px solid #444;
    background:#fff2cc;
    font-size:30px;
    text-align:right;
    padding-right:14px;
    box-sizing:border-box;
}

.operator,
.equal{
    font-size:34px;
}

.result-box{
    width:100%;
    min-height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    border-radius:12px;
    margin-top:10px;
    padding:10px;
    box-sizing:border-box;
}

.action-area{
    margin-bottom:36px;
}

.action-area button{
    width:100%;
    height:64px;
    margin-bottom:10px;
    font-size:28px;
    border-radius:10px;
    border:1px solid #777;
    background:#efefef;
}

#nextButton{
    display:none;
    background:#d9ead3;
}

.hint-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:12px;
}

.ten-hint{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.ten-row{
    display:flex;
    align-items:flex-start;
    gap:10px;
}

.ten-label{
    width:40px;
    font-size:22px;
    font-weight:bold;
}

.ten-block{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.ten-line{
    display:flex;
    gap:3px;
}

.five-gap{
    width:8px;
}

.box{
    width:22px;
    height:22px;
    border:2px solid #222;
    box-sizing:border-box;
}

.on{
    background:#e91b35;
}

.off{
    background:#f2f2f2;
}

.cross-box{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    font-weight:bold;
    background:#f2f2f2;
}

.hint-button{
    width:100%;
    min-height:56px;
    margin-top:14px;
    font-size:22px;
    border-radius:10px;
    border:1px solid #777;
    background:#efefef;
}

.answer-hint{
    margin-top:24px;
    margin-bottom:52px;
}

.multi-grid{
    display:grid;
    grid-template-columns:repeat(10, 24px);
    gap:3px;
    margin-top:14px;
}

.multi-cell{
    width:22px;
    height:22px;
    border:1px solid #444;
}

.multi-on{
    background:#ff8c42;
}

.multi-off{
    background:#f2f2f2;
}

.div-hint-main{
    font-size:30px;
    font-weight:bold;
    margin-bottom:14px;
}

.kuku-table-wrap{
    overflow-x:auto;
    margin-top:18px;
}

.kuku-table{
    border-collapse:collapse;
    font-size:16px;
}

.kuku-table th,
.kuku-table td{
    width:34px;
    height:32px;
    border:1px solid #777;
    text-align:center;
}

.kuku-table th{
    background:#eeeeee;
}

.kuku-head-active{
    background:#ffe599 !important;
}

.kuku-answer{
    background:#f7cfd7;
    color:#c00000;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="top-area">

<h1 id="title">たしざん れんしゅう</h1>

<div class="menu">
    <button onclick="setMode('add')">たしざん</button>
    <button onclick="setMode('sub')">ひきざん</button>
    <button onclick="setMode('mul')">かけざん</button>
    <button onclick="setMode('div')">わりざん</button>
</div>

<div class="level-area" id="mulLevelArea">

<div class="level-label">かけざんレベル：</div>

<div class="level-buttons">
    <button id="mulLevel1" onclick="setMulLevel(1)">1〜3</button>
    <button id="mulLevel2" onclick="setMulLevel(2)">1〜5</button>
    <button id="mulLevel3" onclick="setMulLevel(3)">1〜7</button>
    <button id="mulLevel4" onclick="setMulLevel(4)" class="active-level">1〜10</button>
</div>

</div>

</div>

<div class="status-area">
<div id="scoreText">せいかい：0 / 0</div>
<div id="comboText">れんぞく：0</div>
</div>

<div class="problem">
<div class="num" id="num1"></div>
<div class="operator" id="operator">＋</div>
<div class="num" id="num2"></div>
<div class="equal">＝</div>
<input class="answer" id="answer" type="text" inputmode="numeric">
<div class="result-box" id="resultBox"></div>
</div>

<div class="action-area">
<button id="answerButton">こたえる</button>
<button id="nextButton">つぎのもんだい</button>
</div>

<div class="hint-title">💡ヒント</div>

<div id="hint1"></div>
<div id="hint2"></div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

let mode = "add";
let mulLevel = 4;

let num1 = 0;
let num2 = 0;
let correctAnswer = 0;

let totalCount = 0;
let correctCount = 0;
let comboCount = 0;

let answered = false;

const titleEl = document.getElementById("title");
const num1El = document.getElementById("num1");
const num2El = document.getElementById("num2");
const operatorEl = document.getElementById("operator");
const answerEl = document.getElementById("answer");
const resultBox = document.getElementById("resultBox");

function updateStatus(){
    document.getElementById("scoreText").textContent =
        `せいかい：${correctCount} / ${totalCount}`;

    document.getElementById("comboText").textContent =
        `れんぞく：${comboCount}`;
}

function randN(max){
    return Math.floor(Math.random() * max) + 1;
}

function getMulMax(){
    if(mulLevel === 1) return 3;
    if(mulLevel === 2) return 5;
    if(mulLevel === 3) return 7;
    return 10;
}

function makeBox(type){

    if(type === "cross"){
        return `<span class="box cross-box">×</span>`;
    }

    return `<span class="box ${type}"></span>`;
}

function makeTenBlock(value,type="on"){

    let html = `<div class="ten-block">`;

    for(let row=0; row<2; row++){

        html += `<div class="ten-line">`;

        for(let col=1; col<=10; col++){

            const n = row * 10 + col;

            if(col === 6){
                html += `<span class="five-gap"></span>`;
            }

            if(n <= value){
                html += makeBox(type);
            }else{
                html += makeBox("off");
            }
        }

        html += `</div>`;
    }

    html += `</div>`;

    return html;
}

function showAddSecondHint(){

    document.getElementById("hint2").innerHTML = `
        <div class="ten-hint answer-hint">

            <div class="ten-row">
                <div class="ten-label">=</div>
                ${makeTenBlock(num1 + num2,"on")}
            </div>

        </div>
    `;
}

function showSubSecondHint(){

    document.getElementById("hint2").innerHTML = `
        <div class="ten-hint answer-hint">

            <div class="ten-row">
                <div class="ten-label">=</div>
                ${makeTenBlock(num1 - num2,"on")}
            </div>

        </div>
    `;
}

function makeMultiGrid(rows,cols){

    let html = `<div class="multi-grid">`;

    for(let y=0; y<10; y++){

        for(let x=0; x<10; x++){

            if(y < rows && x < cols){
                html += `<div class="multi-cell multi-on"></div>`;
            }else{
                html += `<div class="multi-cell multi-off"></div>`;
            }
        }
    }

    html += `</div>`;

    return html;
}

function makeKukuTable(rowNum,colNum){

    let html = `<div class="kuku-table-wrap">`;
    html += `<table class="kuku-table">`;

    html += `<tr><th>×</th>`;

    for(let col=1; col<=9; col++){
        html += `<th class="${col===colNum ? "kuku-head-active" : ""}">${col}</th>`;
    }

    html += `</tr>`;

    for(let row=1; row<=9; row++){

        html += `<tr>`;
        html += `<th class="${row===rowNum ? "kuku-head-active" : ""}">${row}</th>`;

        for(let col=1; col<=9; col++){

            const isAnswer = row===rowNum && col===colNum;

            html += `
                <td class="${isAnswer ? "kuku-answer" : ""}">
                    ${row*col}
                </td>
            `;
        }

        html += `</tr>`;
    }

    html += `</table></div>`;

    return html;
}

function setHints(){

    document.getElementById("hint1").innerHTML = "";
    document.getElementById("hint2").innerHTML = "";

    if(mode === "add"){

        document.getElementById("hint1").innerHTML = `
            <div class="ten-hint">

                <div class="ten-row">
                    <div class="ten-label">${num1}</div>
                    ${makeTenBlock(num1,"on")}
                </div>

                <div class="ten-row">
                    <div class="ten-label">${num2}</div>
                    ${makeTenBlock(num2,"on")}
                </div>

                <button class="hint-button" onclick="showAddSecondHint()">
                    こたえのヒントを見る
                </button>

            </div>
        `;
    }

    if(mode === "sub"){

        document.getElementById("hint1").innerHTML = `
            <div class="ten-hint">

                <div class="ten-row">
                    <div class="ten-label">${num1}</div>
                    ${makeTenBlock(num1,"on")}
                </div>

                <div class="ten-row">
                    <div class="ten-label">${num2}</div>
                    ${makeTenBlock(num2,"cross")}
                </div>

                <button class="hint-button" onclick="showSubSecondHint()">
                    こたえのヒントを見る
                </button>

            </div>
        `;
    }

    if(mode === "mul"){

        document.getElementById("hint1").innerHTML = `
            ${makeMultiGrid(num1,num2)}

            <button class="hint-button"
                onclick="document.getElementById('hint2').innerHTML=
                makeKukuTable(num1,num2)">
                九九表を見る
            </button>
        `;
    }

    if(mode === "div"){

        document.getElementById("hint1").innerHTML = `
            <div class="div-hint-main">
                ${num2} × ？ = ${num1}
            </div>

            <button class="hint-button"
                onclick="document.getElementById('hint2').innerHTML=
                makeMultiGrid(num2,correctAnswer)">
                もっとヒントを見る
            </button>
        `;
    }
}

function nextQuestion(){

    answered = false;

    resultBox.textContent = "";
    resultBox.style.background = "transparent";

    document.getElementById("nextButton").style.display = "none";
    document.getElementById("answerButton").style.display = "block";

    answerEl.value = "";

    if(mode === "add"){

        titleEl.textContent = "たしざん れんしゅう";
        operatorEl.textContent = "＋";

        num1 = randN(10);
        num2 = randN(10);
    }

    if(mode === "sub"){

        titleEl.textContent = "ひきざん れんしゅう";
        operatorEl.textContent = "－";

        do{
            num1 = randN(20);
            num2 = randN(20);
        }while(num1 < num2);
    }

    if(mode === "mul"){

        titleEl.textContent = "かけざん れんしゅう";
        operatorEl.textContent = "×";

        const max = getMulMax();

        num1 = randN(max);
        num2 = randN(max);
    }

    if(mode === "div"){

        titleEl.textContent = "わりざん れんしゅう";
        operatorEl.textContent = "÷";

        correctAnswer = randN(10);
        num2 = randN(10);
        num1 = correctAnswer * num2;
    }

    num1El.textContent = num1;
    num2El.textContent = num2;

    setHints();

    answerEl.focus();
}

function setMode(newMode){

    mode = newMode;

    document.getElementById("mulLevelArea").style.display =
        mode === "mul" ? "block" : "none";

    nextQuestion();
}

function setMulLevel(level){

    mulLevel = level;

    document.querySelectorAll(".level-buttons button")
        .forEach(btn => btn.classList.remove("active-level"));

    document.getElementById(`mulLevel${level}`)
        .classList.add("active-level");

    nextQuestion();
}

function getCorrectAnswer(){

    if(mode === "add") return num1 + num2;
    if(mode === "sub") return num1 - num2;
    if(mode === "mul") return num1 * num2;

    return correctAnswer;
}

function checkAnswer(){

    if(answerEl.value === "") return;

    totalCount++;

    const answer = Number(answerEl.value);
    const correct = getCorrectAnswer();

    if(answer === correct){

        correctCount++;
        comboCount++;

        answered = true;

        resultBox.textContent =
            `せいかい🌸 ${comboCount}れんぞく！`;

        resultBox.style.background = "#f7cfd7";
        resultBox.style.color = "#c00000";

        document.getElementById("correctSound").play();

        document.getElementById("nextButton").style.display = "block";
        document.getElementById("answerButton").style.display = "none";

    }else{

        comboCount = 0;

        resultBox.textContent = "ちがうよ😱";

        resultBox.style.background = "#d7f0d7";
        resultBox.style.color = "#008000";

        document.getElementById("wrongSound").play();

        answerEl.select();
    }

    updateStatus();
}

document.getElementById("answerButton")
    .addEventListener("click",checkAnswer);

document.getElementById("nextButton")
    .addEventListener("click",nextQuestion);

answerEl.addEventListener("keydown",function(e){

    if(e.key === "Enter"){

        e.preventDefault();

        if(answered){
            nextQuestion();
        }else{
            checkAnswer();
        }
    }
});

updateStatus();
nextQuestion();

</script>

</body>
</html>
