<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けいさんれんしゅう</title>

<style>
body{
    font-family:"Yu Gothic","Hiragino Maru Gothic ProN",sans-serif;
    padding:24px;
    background:#ffffff;
}

.top-area{
    display:grid;
    grid-template-columns:360px 520px;
    align-items:start;
    margin-bottom:40px;
}

h1{
    font-size:34px;
    margin:0;
}

.menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.menu button{
    height:58px;
    font-size:24px;
    background:#efefef;
    border:1px solid #777;
    border-radius:10px;
    cursor:pointer;
}

.level-area{
    display:none;
    margin-top:14px;
    gap:8px;
    align-items:center;
    font-size:22px;
    flex-wrap:wrap;
}

.level-label{
    width:100%;
}

.level-buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    width:100%;
}

.level-area button{
    height:42px;
    font-size:20px;
    padding:0 14px;
    border:1px solid #777;
    background:#f2f2f2;
    border-radius:8px;
    cursor:pointer;
}

.level-area button.active-level{
    background:#ffe599;
    font-weight:bold;
}

.status-area{
    display:flex;
    gap:24px;
    margin-bottom:30px;
    font-size:28px;
    font-weight:bold;
}

.problem{
    display:flex;
    align-items:center;
    gap:22px;
    margin-bottom:18px;
    flex-wrap:wrap;
}

.num{
    width:150px;
    height:84px;
    border:1px solid #333;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    font-size:36px;
    padding-right:16px;
    box-sizing:border-box;
}

.answer{
    width:150px;
    height:84px;
    border:2px solid #444;
    background:#fff2cc;
    font-size:36px;
    text-align:right;
    padding-right:16px;
    box-sizing:border-box;
}

.operator,
.equal{
    font-size:42px;
}

.result-box{
    min-width:440px;
    height:84px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:bold;
    border-radius:12px;
    transition:0.2s;
    padding:0 16px;
    box-sizing:border-box;
    white-space:nowrap;
}

.correct-anim{
    transform:scale(1.05);
}

.action-area{
    margin-left:640px;
    margin-bottom:45px;
}

.action-area button{
    height:58px;
    font-size:26px;
    padding:0 28px;
    margin-right:12px;
    border:1px solid #777;
    background:#f2f2f2;
    border-radius:8px;
}

#nextButton{
    display:none;
    background:#d9ead3;
}

.hint-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.hint-grid{
    display:block;
}

.ten-hint{
    display:flex;
    flex-direction:column;
    gap:14px;
    font-size:24px;
    font-weight:bold;
}

.ten-row{
    display:flex;
    align-items:center;
    gap:10px;
}

.ten-label{
    width:70px;
}

.ten-boxes{
    display:flex;
    gap:4px;
}

.ten-gap-small{
    width:8px;
}

.ten-gap-large{
    width:18px;
}

.box{
    width:28px;
    height:28px;
    border:2px solid #222;
    box-sizing:border-box;
}

.on{
    background:#e91b35;
}

.off{
    background:#f2f2f2;
}

.cross{
    background:#f2f2f2;
    position:relative;
}

.cross::before,
.cross::after{
    content:"";
    position:absolute;
    top:12px;
    left:3px;
    width:18px;
    height:2px;
    background:#222;
}

.cross::before{
    transform:rotate(45deg);
}

.cross::after{
    transform:rotate(-45deg);
}

.hint-button{
    min-height:56px;
    font-size:22px;
    padding:8px 18px;
    border:1px solid #777;
    background:#f2f2f2;
    border-radius:8px;
    white-space:nowrap;
    cursor:pointer;
    margin-top:14px;
}

.multi-grid{
    display:grid;
    grid-template-columns:repeat(10, 30px);
    gap:4px;
    margin-top:14px;
}

.multi-cell{
    width:28px;
    height:28px;
    border:1px solid #444;
    box-sizing:border-box;
}

.multi-on{
    background:#ff8c42;
}

.multi-off{
    background:#f2f2f2;
}

.div-hint-main{
    font-size:36px;
    font-weight:bold;
    margin-bottom:14px;
}

.kuku-table-wrap{
    margin-top:18px;
    overflow-x:auto;
    max-width:100%;
}

.kuku-table{
    border-collapse:collapse;
    font-size:18px;
}

.kuku-table th,
.kuku-table td{
    width:42px;
    height:36px;
    border:1px solid #777;
    text-align:center;
    vertical-align:middle;
}

.kuku-table th{
    background:#eeeeee;
    font-weight:bold;
}

.kuku-head-active{
    background:#ffe599 !important;
}

.kuku-answer{
    background:#f7cfd7;
    color:#c00000;
    font-weight:bold;
    font-size:22px;
}

@media (max-width:700px){

    body{
        padding:16px;
    }

    .top-area{
        display:block;
        margin-bottom:24px;
    }

    h1{
        font-size:28px;
        margin-bottom:16px;
    }

    .menu{
        grid-template-columns:1fr 1fr;
        gap:8px;
    }

    .menu button{
        height:46px;
        font-size:21px;
        border-radius:8px;
    }

    .level-area{
        display:none;
        margin-top:12px;
        font-size:20px;
    }

    .level-buttons{
        grid-template-columns:1fr 1fr;
        gap:8px;
    }

    .level-area button{
        height:44px;
        font-size:20px;
    }

    .status-area{
        font-size:22px;
        flex-direction:row;
        gap:16px;
        flex-wrap:wrap;
        margin-bottom:24px;
    }

    .problem{
        gap:12px;
    }

    .num,
    .answer{
        width:92px;
        height:62px;
        font-size:30px;
    }

    .operator,
    .equal{
        font-size:34px;
    }

    .result-box{
        width:100%;
        min-width:0;
        height:64px;
        font-size:26px;
        margin-top:10px;
        white-space:normal;
    }

    .action-area{
        margin-left:0;
        margin-bottom:35px;
    }

    .action-area button{
        width:100%;
        height:64px;
        margin-bottom:10px;
        font-size:28px;
        border-radius:10px;
    }

    .ten-hint{
        font-size:20px;
        gap:12px;
    }

    .ten-label{
        width:54px;
    }

    .box{
        width:22px;
        height:22px;
    }

    .cross::before,
    .cross::after{
        top:9px;
        left:2px;
        width:14px;
    }

    .multi-grid{
        grid-template-columns:repeat(10, 24px);
        gap:3px;
    }

    .multi-cell{
        width:22px;
        height:22px;
    }

    .div-hint-main{
        font-size:30px;
    }

    .hint-button{
        width:auto;
        min-height:56px;
        font-size:22px;
        padding:8px 16px;
    }

    .kuku-table{
        font-size:16px;
    }

    .kuku-table th,
    .kuku-table td{
        width:34px;
        height:32px;
    }

    .kuku-answer{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="top-area">

    <h1 id="title">たしざん れんしゅう</h1>

    <div>

        <div class="menu">
            <button onclick="setMode('add')">たしざん</button>
            <button onclick="setMode('sub')">ひきざん</button>
            <button onclick="setMode('mul')">かけざん</button>
            <button onclick="setMode('div')">わりざん</button>
        </div>

        <div class="level-area" id="mulLevelArea">

            <div class="level-label">かけざんレベル：</div>

            <div class="level-buttons">
                <button id="mulLevel1" onclick="setMulLevel(1)">1〜3</button>
                <button id="mulLevel2" onclick="setMulLevel(2)">1〜5</button>
                <button id="mulLevel3" onclick="setMulLevel(3)">1〜7</button>
                <button id="mulLevel4" onclick="setMulLevel(4)" class="active-level">1〜10</button>
            </div>

        </div>

    </div>

</div>

<div class="status-area">
    <div id="scoreText">せいかい：0 / 0</div>
    <div id="comboText">れんぞく：0</div>
</div>

<div class="problem">
    <div class="num" id="num1"></div>
    <div class="operator" id="operator">＋</div>
    <div class="num" id="num2"></div>
    <div class="equal">＝</div>
    <input class="answer" id="answer" type="text" inputmode="numeric">
    <div class="result-box" id="resultBox"></div>
</div>

<div class="action-area">
    <button id="answerButton">こたえる</button>
    <button id="nextButton">つぎのもんだい</button>
</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<div class="hint-title">💡ヒント</div>

<div class="hint-grid">
    <div id="hint1L"></div>
    <div id="hint1R"></div>
    <div id="hint2L"></div>
    <div id="hint2R"></div>
    <div id="hint3L"></div>
    <div id="hint3R"></div>
    <div id="hint4L"></div>
    <div id="hint4R"></div>
</div>

<script>
let mode = "add";
let mulLevel = 4;

let num1 = 0;
let num2 = 0;
let correctAnswer = 0;

let answered = false;

let totalCount = 0;
let correctCount = 0;
let comboCount = 0;

const titleEl = document.getElementById("title");
const num1El = document.getElementById("num1");
const num2El = document.getElementById("num2");
const operatorEl = document.getElementById("operator");
const answerEl = document.getElementById("answer");
const resultBox = document.getElementById("resultBox");

const answerButton = document.getElementById("answerButton");
const nextButton = document.getElementById("nextButton");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

const scoreText = document.getElementById("scoreText");
const comboText = document.getElementById("comboText");

const mulLevelArea = document.getElementById("mulLevelArea");

function updateStatus(){
    scoreText.textContent = `せいかい：${correctCount} / ${totalCount}`;
    comboText.textContent = `れんぞく：${comboCount}`;
}

function randN(max){
    return Math.floor(Math.random() * max) + 1;
}

function rand10(){
    return randN(10);
}

function rand20(){
    return randN(20);
}

function getMulMax(){
    if(mulLevel === 1) return 3;
    if(mulLevel === 2) return 5;
    if(mulLevel === 3) return 7;
    return 10;
}

function clearHints(){
    for(let i = 1; i <= 4; i++){
        document.getElementById(`hint${i}L`).innerHTML = "";
        document.getElementById(`hint${i}R`).innerHTML = "";
    }
}

function makeBox(type){
    return `<span class="box ${type}"></span>`;
}

function makeTenBoxes(value){
    let html = '<div class="ten-boxes">';

    for(let i = 1; i <= 20; i++){
        if(i === 6 || i === 16){
            html += '<span class="ten-gap-small"></span>';
        }

        if(i === 11){
            html += '<span class="ten-gap-large"></span>';
        }

        html += makeBox(i <= value ? "on" : "off");
    }

    html += '</div>';
    return html;
}

function makeSubCrossBoxes(total, minus){
    let html = '<div class="ten-boxes">';
    const remain = total - minus;

    for(let i = 1; i <= 20; i++){
        if(i === 6 || i === 16){
            html += '<span class="ten-gap-small"></span>';
        }

        if(i === 11){
            html += '<span class="ten-gap-large"></span>';
        }

        if(i <= remain){
            html += makeBox("on");
        }else if(i <= total){
            html += makeBox("cross");
        }else{
            html += makeBox("off");
        }
    }

    html += '</div>';
    return html;
}

function makeAddHintStage1(a,b){
    return `
        <div class="ten-hint">
            <div class="ten-row">
                <div class="ten-label">${a}</div>
                ${makeTenBoxes(a)}
            </div>

            <div class="ten-row">
                <div class="ten-label">+ ${b}</div>
                ${makeTenBoxes(b)}
            </div>

            <button class="hint-button" onclick="showAddSecondHint()">
                こたえのヒントを見る
            </button>
        </div>
    `;
}

function showAddSecondHint(){
    const total = num1 + num2;

    document.getElementById("hint2L").innerHTML = `
        <div class="ten-hint">
            <div class="ten-row">
                <div class="ten-label">= ${total}</div>
                ${makeTenBoxes(total)}
            </div>
        </div>
    `;
}

function makeSubHintStage1(a,b){
    return `
        <div class="ten-hint">
            <div class="ten-row">
                <div class="ten-label">${a}</div>
                ${makeTenBoxes(a)}
            </div>

            <div class="ten-row">
                <div class="ten-label">- ${b}</div>
                ${makeSubCrossBoxes(a,b)}
            </div>

            <button class="hint-button" onclick="showSubSecondHint()">
                こたえのヒントを見る
            </button>
        </div>
    `;
}

function showSubSecondHint(){
    const remain = num1 - num2;

    document.getElementById("hint2L").innerHTML = `
        <div class="ten-hint">
            <div class="ten-row">
                <div class="ten-label">= ${remain}</div>
                ${makeTenBoxes(remain)}
            </div>
        </div>
    `;
}

function makeMultiGrid(rows, cols){
    let html = '<div class="multi-grid">';

    for(let y = 0; y < 10; y++){
        for(let x = 0; x < 10; x++){
            if(y < rows && x < cols){
                html += '<div class="multi-cell multi-on"></div>';
            }else{
                html += '<div class="multi-cell multi-off"></div>';
            }
        }
    }

    html += '</div>';
    return html;
}

function makeKukuTable(rowNum, colNum){
    let html = '<div class="kuku-table-wrap">';
    html += '<table class="kuku-table">';

    html += '<tr><th>×</th>';

    for(let col = 1; col <= 9; col++){
        html += `<th class="${col === colNum ? "kuku-head-active" : ""}">${col}</th>`;
    }

    html += '</tr>';

    for(let row = 1; row <= 9; row++){
        html += `<tr><th class="${row === rowNum ? "kuku-head-active" : ""}">${row}</th>`;

        for(let col = 1; col <= 9; col++){
            const isAnswer = row === rowNum && col === colNum;

            html += `
                <td class="${isAnswer ? "kuku-answer" : ""}">
                    ${row * col}
                </td>
            `;
        }

        html += '</tr>';
    }

    html += '</table>';
    html += '</div>';

    return html;
}

function showMultiplicationSecondHint(){
    document.getElementById("hint2L").innerHTML
        = makeKukuTable(num1, num2);
}

function showDivisionSecondHint(){
    document.getElementById("hint2L").innerHTML
        = makeMultiGrid(num2, correctAnswer);
}

function setHints(){
    clearHints();

    if(mode === "add"){
        document.getElementById("hint1L").innerHTML
            = makeAddHintStage1(num1, num2);
        return;
    }

    if(mode === "sub"){
        document.getElementById("hint1L").innerHTML
            = makeSubHintStage1(num1, num2);
        return;
    }

    if(mode === "mul"){
        document.getElementById("hint1L").innerHTML
            = makeMultiGrid(num1, num2);

        document.getElementById("hint2L").innerHTML
            = `
                <button class="hint-button" onclick="showMultiplicationSecondHint()">
                    九九表を見る
                </button>
            `;

        return;
    }

    if(mode === "div"){
        document.getElementById("hint1L").innerHTML
            = `
                <div class="div-hint-main">
                    ${num2} × ？ = ${num1}
                </div>

                <button class="hint-button" onclick="showDivisionSecondHint()">
                    もっとヒントを見る
                </button>
            `;

        return;
    }
}

function setMode(newMode){
    mode = newMode;

    if(mode === "mul"){
        mulLevelArea.style.display = "flex";
    }else{
        mulLevelArea.style.display = "none";
    }

    nextQuestion();
}

function setMulLevel(level){
    mulLevel = level;

    document.querySelectorAll(".level-area button").forEach(function(button){
        button.classList.remove("active-level");
    });

    document.getElementById(`mulLevel${level}`).classList.add("active-level");

    if(mode === "mul"){
        nextQuestion();
    }
}

function nextQuestion(){
    answered = false;

    resultBox.textContent = "";
    resultBox.style.background = "transparent";
    resultBox.style.color = "";
    resultBox.classList.remove("correct-anim");

    nextButton.style.display = "none";
    answerButton.style.display = "inline-block";

    answerEl.value = "";

    if(mode === "add"){
        titleEl.textContent = "たしざん れんしゅう";
        operatorEl.textContent = "＋";

        num1 = rand10();
        num2 = rand10();

    }else if(mode === "sub"){
        titleEl.textContent = "ひきざん れんしゅう";
        operatorEl.textContent = "－";

        do{
            num1 = rand20();
            num2 = rand20();
        }while(num1 < num2);

    }else if(mode === "mul"){
        titleEl.textContent = "かけざん れんしゅう";
        operatorEl.textContent = "×";

        const max = getMulMax();

        num1 = randN(max);
        num2 = randN(max);

    }else if(mode === "div"){
        titleEl.textContent = "わりざん れんしゅう";
        operatorEl.textContent = "÷";

        correctAnswer = rand10();
        num2 = rand10();
        num1 = correctAnswer * num2;
    }

    num1El.textContent = num1;
    num2El.textContent = num2;

    setHints();

    answerEl.focus();
}

function getCorrectAnswer(){
    if(mode === "add") return num1 + num2;
    if(mode === "sub") return num1 - num2;
    if(mode === "mul") return num1 * num2;
    return correctAnswer;
}

function checkAnswer(){
    if(answerEl.value === "") return;

    const answer = Number(answerEl.value);
    const correct = getCorrectAnswer();

    totalCount++;

    if(answer === correct){
        correctCount++;
        comboCount++;

        answered = true;

        resultBox.textContent = `せいかい🌸 ${comboCount}れんぞく！`;

        correctSound.currentTime = 0;
        correctSound.play();

        resultBox.style.background = "#f7cfd7";
        resultBox.style.color = "#c00000";
        resultBox.classList.add("correct-anim");

        nextButton.style.display = "inline-block";
        answerButton.style.display = "none";

    }else{
        comboCount = 0;

        resultBox.textContent = "ちがうよ😱";

        wrongSound.currentTime = 0;
        wrongSound.play();

        resultBox.style.background = "#d7f0d7";
        resultBox.style.color = "#008000";

        answerEl.select();
    }

    updateStatus();

    if(totalCount >= 10){
        setTimeout(function(){
            alert(
                `10もん おわり！\n\n`
                + `せいかい：${correctCount} / ${totalCount}`
            );

            totalCount = 0;
            correctCount = 0;
            comboCount = 0;

            updateStatus();

        },300);
    }
}

answerEl.addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        event.preventDefault();

        if(answered){
            nextQuestion();
        }else{
            checkAnswer();
        }
    }
});

answerButton.addEventListener("click", function(){
    checkAnswer();
});

nextButton.addEventListener("click", function(){
    nextQuestion();
});

updateStatus();
nextQuestion();

</script>

</body>
</html>
