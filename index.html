<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けいさんれんしゅう</title>

<style>
body{
    font-family:"Yu Gothic","Hiragino Maru Gothic ProN",sans-serif;
    padding:24px;
    background:#ffffff;
}

.top-area{
    display:grid;
    grid-template-columns: 360px 420px 160px;
    align-items:start;
    margin-bottom:70px;
}

h1{
    font-size:34px;
    margin:0;
}

.menu{
    display:flex;
    flex-direction:column;
}

.menu button{
    height:56px;
    font-size:26px;
    background:#efefef;
    border:1px solid #777;
}

.shortcut{
    font-size:22px;
    line-height:56px;
    margin-left:20px;
}

.problem{
    display:flex;
    align-items:center;
    gap:22px;
    margin-bottom:18px;
    flex-wrap:wrap;
}

.num{
    width:150px;
    height:84px;
    border:1px solid #333;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    font-size:36px;
    padding-right:16px;
    box-sizing:border-box;
}

.answer{
    width:150px;
    height:84px;
    border:2px solid #444;
    background:#fff2cc;
    font-size:36px;
    text-align:right;
    padding-right:16px;
    box-sizing:border-box;
}

.operator,
.equal{
    font-size:42px;
}

.result-box{
    min-width:260px;
    height:84px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:bold;
}

.next-guide{
    margin-left:640px;
    font-size:24px;
    margin-bottom:28px;
}

.action-area{
    margin-left:640px;
    margin-bottom:45px;
}

.action-area button{
    height:58px;
    font-size:26px;
    padding:0 28px;
    margin-right:12px;
    border:1px solid #777;
    background:#f2f2f2;
    border-radius:8px;
}

#nextButton{
    display:none;
    background:#d9ead3;
}

.hint-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.hint-grid{
    display:grid;
    grid-template-columns:220px 220px;
    row-gap:8px;
    column-gap:40px;
}

.apple-row{
    display:flex;
    gap:6px;
}

.box{
    width:28px;
    height:28px;
    border:2px solid #222;
    box-sizing:border-box;
}

.on{
    background:#e91b35;
}

.off{
    background:#f2f2f2;
}

@media (max-width: 700px){

    body{
        padding:16px;
    }

    .top-area{
        display:block;
        margin-bottom:36px;
    }

    h1{
        font-size:28px;
        margin-bottom:18px;
    }

    .shortcut{
        display:none;
    }

    .problem{
        gap:12px;
    }

    .num,
    .answer{
        width:92px;
        height:62px;
        font-size:30px;
    }

    .operator,
    .equal{
        font-size:34px;
    }

    .result-box{
        width:100%;
        min-width:0;
        height:64px;
        font-size:30px;
        margin-top:10px;
    }

    .next-guide,
    .action-area{
        margin-left:0;
    }

    .hint-grid{
        grid-template-columns:1fr 1fr;
        column-gap:24px;
    }

    .box{
        width:24px;
        height:24px;
    }
}
</style>
</head>

<body>

<div class="top-area">

    <h1 id="title">たしざん れんしゅう</h1>

    <div class="menu">
        <button onclick="setMode('add')">
            つぎのもんだい（たしざん）
        </button>

        <button onclick="setMode('sub')">
            つぎのもんだい（ひきざん）
        </button>
    </div>

    <div>
        <div class="shortcut">※Ctrl+z</div>
        <div class="shortcut">※Ctrl+x</div>
    </div>

</div>

<div class="problem">

    <div class="num" id="num1"></div>

    <div class="operator" id="operator">＋</div>

    <div class="num" id="num2"></div>

    <div class="equal">＝</div>

    <input class="answer" id="answer" type="text" inputmode="numeric">

    <div class="result-box" id="resultBox"></div>

</div>

<div class="next-guide" id="nextGuide">
    ▶「せいかい」したらEnterおしてね
</div>

<div class="action-area">
    <button id="answerButton">こたえる</button>
    <button id="nextButton">つぎのもんだい</button>
</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<div class="hint-title">💡ヒント</div>

<div class="hint-grid">

    <div id="hint1L"></div>
    <div id="hint1R"></div>

    <div id="hint2L"></div>
    <div id="hint2R"></div>

    <div id="hint3L"></div>
    <div id="hint3R"></div>

    <div id="hint4L"></div>
    <div id="hint4R"></div>

</div>

<script>

let mode = "add";

let num1 = 0;
let num2 = 0;

let answered = false;

const titleEl = document.getElementById("title");

const num1El = document.getElementById("num1");
const num2El = document.getElementById("num2");

const operatorEl = document.getElementById("operator");

const answerEl = document.getElementById("answer");

const resultBox = document.getElementById("resultBox");

const nextGuide = document.getElementById("nextGuide");

const answerButton = document.getElementById("answerButton");
const nextButton = document.getElementById("nextButton");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

function rand10(){
    return Math.floor(Math.random() * 10) + 1;
}

function rand20(){
    return Math.floor(Math.random() * 20) + 1;
}

function makeBoxRow(count){

    let html = '<div class="apple-row">';

    for(let i = 0; i < 5; i++){

        html += `<span class="box ${i < count ? "on" : "off"}"></span>`;
    }

    html += '</div>';

    return html;
}

function setHints(left,right){

    for(let i = 0; i < 4; i++){

        const leftCount = Math.min(5, Math.max(0, left - i * 5));
        const rightCount = Math.min(5, Math.max(0, right - i * 5));

        document.getElementById(`hint${i + 1}L`).innerHTML
            = makeBoxRow(leftCount);

        document.getElementById(`hint${i + 1}R`).innerHTML
            = makeBoxRow(rightCount);
    }
}

function setMode(newMode){

    mode = newMode;

    nextQuestion();
}

function nextQuestion(){

    answered = false;

    resultBox.textContent = "";

    resultBox.style.background = "transparent";
    resultBox.style.color = "";

    nextButton.style.display = "none";

    answerButton.style.display = "inline-block";

    answerEl.value = "";

    if(mode === "add"){

        titleEl.textContent = "たしざん れんしゅう";

        operatorEl.textContent = "＋";

        num1 = rand10();
        num2 = rand10();

    }else{

        titleEl.textContent = "ひきざん れんしゅう";

        operatorEl.textContent = "－";

        do{

            num1 = rand20();
            num2 = rand20();

        }while(num1 < num2);
    }

    num1El.textContent = num1;
    num2El.textContent = num2;

    setHints(num1,num2);

    nextGuide.textContent
        = "▶「せいかい」したらEnterおしてね";

    answerEl.focus();
}

function checkAnswer(){

    if(answerEl.value === "") return;

    const answer = Number(answerEl.value);

    const correct = mode === "add"
        ? num1 + num2
        : num1 - num2;

    if(answer === correct){

        answered = true;

        resultBox.textContent = "せいかい🌸";

        correctSound.currentTime = 0;
        correctSound.play();

        resultBox.style.background = "#f7cfd7";
        resultBox.style.color = "#c00000";

        nextGuide.textContent
            = "▶ Enter または「つぎのもんだい」";

        nextButton.style.display = "inline-block";

        answerButton.style.display = "none";

    }else{

        resultBox.textContent = "ちがうよ😱";

        wrongSound.currentTime = 0;
        wrongSound.play();

        resultBox.style.background = "#d7f0d7";
        resultBox.style.color = "#008000";

        nextGuide.textContent
            = "もういちど こたえてね";

        answerEl.select();
    }
}

answerEl.addEventListener("keydown", function(event){

    if(event.key === "Enter"){

        event.preventDefault();

        if(answered){

            nextQuestion();

        }else{

            checkAnswer();
        }
    }
});

answerButton.addEventListener("click", function(){

    checkAnswer();
});

nextButton.addEventListener("click", function(){

    nextQuestion();
});

document.addEventListener("keydown", function(event){

    if(event.ctrlKey && event.key.toLowerCase() === "z"){

        event.preventDefault();

        setMode("add");
    }

    if(event.ctrlKey && event.key.toLowerCase() === "x"){

        event.preventDefault();

        setMode("sub");
    }
});

nextQuestion();

</script>

</body>
</html>
